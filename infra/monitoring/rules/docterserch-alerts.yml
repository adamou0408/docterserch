# ──────────────────────────────────────────────
# Alert Rules — 醫院門診地圖搜尋
# Spec: specs/hospital-clinic-map-search/spec.md — US-5
# ──────────────────────────────────────────────

groups:
  - name: docterserch-alerts
    rules:

      # ── App Health ──
      - alert: AppDown
        expr: docterserch_up == 0
        for: 1m
        labels:
          severity: critical
          feedback_loop: "true"
        annotations:
          summary: "DoctorSearch 應用程式已停止"
          intake_template: "bug-report"
          auto_description: |
            ## 自動問題回報（來自監控系統）
            **回報人**：監控系統（自動）
            **緊急程度**：很急
            **發生了什麼事？**
            DoctorSearch 應用程式已停止回應超過 1 分鐘。

      # ── Database Health ──
      - alert: DatabaseDown
        expr: docterserch_db_up == 0
        for: 1m
        labels:
          severity: critical
          feedback_loop: "true"
        annotations:
          summary: "DoctorSearch 資料庫連線失敗"
          intake_template: "bug-report"
          auto_description: |
            ## 自動問題回報（來自監控系統）
            **回報人**：監控系統（自動）
            **緊急程度**：很急
            **發生了什麼事？**
            無法連線到 PostgreSQL 資料庫。所有搜尋功能無法使用。

      # ── Crawl Failures ──
      - alert: CrawlFailureHigh
        expr: docterserch_crawl_failed_total > 3
        for: 5m
        labels:
          severity: warning
          feedback_loop: "true"
        annotations:
          summary: "爬蟲失敗次數過高"
          intake_template: "bug-report"
          auto_description: |
            ## 自動問題回報（來自監控系統）
            **回報人**：監控系統（自動）
            **緊急程度**：普通
            **發生了什麼事？**
            最近 50 次爬蟲紀錄中，失敗次數超過 3 次。
            可能有醫院官網改版導致爬蟲失效。

      # ── Data Coverage ──
      - alert: LowDataCoverage
        expr: docterserch_data_coverage_ratio < 0.5
        for: 24h
        labels:
          severity: warning
          feedback_loop: "true"
        annotations:
          summary: "門診資料覆蓋率低於 50%"
          intake_template: "user-feedback"
          auto_description: |
            ## 自動用戶體驗回報（來自監控系統）
            **反饋來源**：資料品質監控
            **發生了什麼事？**
            醫院門診資料覆蓋率持續低於 50%，使用者搜尋體驗受影響。

      # ── Data Freshness ──
      - alert: StaleData
        expr: docterserch_schedules_total == 0 and docterserch_hospitals_total > 0
        for: 48h
        labels:
          severity: warning
          feedback_loop: "true"
        annotations:
          summary: "無門診時刻表資料"
          intake_template: "bug-report"
          auto_description: |
            ## 自動問題回報（來自監控系統）
            **回報人**：監控系統（自動）
            **發生了什麼事？**
            資料庫有醫院資料但無門診時刻表，爬蟲可能全部失效。
