# ──────────────────────────────────────────────
# Prometheus — Local Development Configuration
# Spec: specs/hospital-clinic-map-search/spec.md
# ──────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "docterserch-app"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: /api/metrics
    scrape_interval: 30s
