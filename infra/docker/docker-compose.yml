# ──────────────────────────────────────────────
# Demand-Driven Dev — Local Development
# Spec: specs/hospital-clinic-map-search/spec.md
# Task: specs/hospital-clinic-map-search/tasks.md — Task 8
# ──────────────────────────────────────────────
# Usage: docker compose up -d

services:
  # ── PostgreSQL + PostGIS ──
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: docterserch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Next.js Application ──
  app:
    build:
      context: ../../src
      dockerfile: ../infra/docker/Dockerfile.app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/docterserch
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-admin-token}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Local monitoring (simulates production feedback loop) ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alerts.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
